sampling:
  frame_step: 5
  sample_frame_limit: 18

detector:
  backend: ultralytics_yolo
  weights: yolo11n.pt
  confidence: 0.25
  person_class_id: 0
  expand_scale: 1.4
  bottom_bias: 0.65
  crop_short_edge: 640

validity:
  keypoint_confidence: 0.30
  min_core_confidence: 0.35
  min_core_joint_count: 6
  max_core_joint_jump_ratio: 0.18

models:
  mediapipe_full:
    display_name: MediaPipe Full
    backend: mediapipe
    model_complexity: 1
    input_short_edge: 512
    min_detection_confidence: 0.35
    min_tracking_confidence: 0.35
    core_layout: mediapipe33

  mediapipe_heavy:
    display_name: MediaPipe Heavy
    backend: mediapipe
    model_complexity: 2
    input_short_edge: 512
    min_detection_confidence: 0.35
    min_tracking_confidence: 0.35
    core_layout: mediapipe33

  yolo_pose_medium:
    display_name: YOLO Pose Medium
    backend: yolo_pose
    weights: yolo11m-pose.pt
    input_size: 640
    confidence: 0.25
    core_layout: coco17

  rtmpose_l_halpe26_256x192:
    display_name: RTMPose-l Halpe26 256x192
    backend: rtmpose
    pose2d: rtmpose-l_8xb512-700e_body8-halpe26-256x192
    input_size: [256, 192]
    device: cpu
    core_layout: halpe26

  rtmpose_m_halpe26_384x288:
    display_name: RTMPose-m Halpe26 384x288
    backend: rtmpose
    pose2d: rtmpose-m_8xb512-700e_body8-halpe26-384x288
    input_size: [384, 288]
    device: cpu
    core_layout: halpe26

  rtmpose_l_halpe26_384x288:
    display_name: RTMPose-l Halpe26 384x288
    backend: rtmpose
    pose2d: rtmpose-l_8xb512-700e_body8-halpe26-384x288
    input_size: [384, 288]
    device: cpu
    core_layout: halpe26
